# nginx vhost for www.one2agi.com (主博客域名) → notionnext app on 127.0.0.1:3030
#
# 部署步骤:
#   1. scp deploy/nginx/www.one2agi.com.conf tencent-vps:/tmp/
#   2. ssh tencent-vps 'sudo cp /tmp/www.one2agi.com.conf /etc/nginx/sites-enabled/'
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. certbot --nginx -d www.one2agi.com -d one2agi.com(自动加 SSL 块)
#   5. sudo systemctl reload nginx
#
# 替换 notion.one2agi.com.conf 的所有内容,作为主博客

# ---- HTTP: redirect apex to www and www to HTTPS, except for ACME challenges ----
server {
    listen 80;
    listen [::]:80;
    server_name one2agi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://www.one2agi.com$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name www.one2agi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://www.one2agi.com$request_uri;
    }
}

# ---- HTTPS: apex redirect + TLS terminate reverse proxy to notionnext ----
upstream notionnext_app {
    server 127.0.0.1:3030;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name one2agi.com;

    ssl_certificate     /etc/letsencrypt/live/www.one2agi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.one2agi.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    return 301 https://www.one2agi.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.one2agi.com;

    ssl_certificate     /etc/letsencrypt/live/www.one2agi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.one2agi.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全 headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # /api/health 不打访问日志
    location = /api/health {
        proxy_pass http://notionnext_app;
        access_log off;
    }

    # Next.js 静态资源 1 年缓存
    location ^~ /_next/static/ {
        proxy_pass http://notionnext_app;
        proxy_cache_valid 200 365d;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js page-data/runtime 与 API 必须留在 starter 容器。
    location ^~ /_next/ {
        proxy_pass http://notionnext_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://notionnext_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # starter 首页自身需要的公开静态目录和根文件。
    location ~* ^/(?:images|fonts|css|js|assets)/ {
        proxy_pass http://notionnext_app;
        access_log off;
    }

    location ~* \.(?:ico|png|jpe?g|gif|webp|avif|svg|woff2?|ttf|otf|xml|txt|webmanifest)$ {
        proxy_pass http://notionnext_app;
        access_log off;
    }

    # www 只拥有品牌首页；不缓存 HTML，让 Next.js ISR 自己管。
    location = / {
        proxy_pass http://notionnext_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 所有历史内容入口永久迁移到 way，完整保留路径、查询参数。
    location / {
        return 308 https://way.one2agi.com$request_uri;
    }
}
