# 自建部署 - 1 节点,4G 内存假设
# 架构:Nginx -> landing app (1G) + content way (1.8G) -> Redis (256M) -> Notion API
# 不上 PM2 / 多实例 (避免 ISR 缓存不一致)
#
# 启动: docker compose --env-file .env.production up -d --build
# 停:   docker compose --env-file .env.production down
# 删:   docker compose --env-file .env.production down -v  (连缓存一起清,慎用)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # build-arg 必传 — blog.config.js 顶层读取 NOTION_PAGE_ID
        NOTION_PAGE_ID: ${NOTION_PAGE_ID:?NOTION_PAGE_ID required, set in .env.production}
        NEXT_PUBLIC_THEME: ${NEXT_PUBLIC_THEME:-starter}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://www.one2agi.com}
        NEXT_PUBLIC_LINK: ${NEXT_PUBLIC_LINK:-https://www.one2agi.com}
        NEXT_PUBLIC_SITE_ROLE: landing
        NEXT_PUBLIC_CONTENT_SITE_URL: ${WAY_SITE_URL:-https://way.one2agi.com}
    image: notionnext:${IMAGE_TAG:-1.0.0}
    container_name: notionnext-app
    restart: unless-stopped
    ports:
      # 用 3030 避免和服务器现有 wechat-article-exporter 冲突(它占用 3000)
      - "127.0.0.1:3030:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://www.one2agi.com}
      - NEXT_PUBLIC_LINK=${NEXT_PUBLIC_LINK:-https://www.one2agi.com}
      - NEXT_PUBLIC_SITE_ROLE=landing
      - NEXT_PUBLIC_CONTENT_SITE_URL=${WAY_SITE_URL:-https://way.one2agi.com}
      - NODE_OPTIONS=--max-old-space-size=768
      # REDIS_URL 指向 docker-compose 服务名 (自动 DNS 解析)
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # landing 的 Next.js 运行缓存；不与 way 共享渲染产物
      - notion-cache:/app/.next/cache
    # starter 只承载品牌首页，给系统和内容容器保留内存余量
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - nn-net

  way:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # way 子域名 - heo 主题 - 复用主站 NOTION_PAGE_ID (完全复用 page id)
        NOTION_PAGE_ID: ${NOTION_PAGE_ID:?NOTION_PAGE_ID required, set in .env.production}
        NEXT_PUBLIC_THEME: heo
        NEXT_PUBLIC_SITE_URL: ${WAY_SITE_URL:-https://way.one2agi.com}
        NEXT_PUBLIC_LINK: ${WAY_SITE_URL:-https://way.one2agi.com}
        NEXT_PUBLIC_SITE_ROLE: content
        NEXT_PUBLIC_CONTENT_SITE_URL: ${WAY_SITE_URL:-https://way.one2agi.com}
    image: notionnext-way:${IMAGE_TAG:-1.0.0}
    container_name: notionnext-way
    restart: unless-stopped
    ports:
      - "127.0.0.1:3031:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SITE_URL=${WAY_SITE_URL:-https://way.one2agi.com}
      - NEXT_PUBLIC_LINK=${WAY_SITE_URL:-https://way.one2agi.com}
      - NEXT_PUBLIC_SITE_ROLE=content
      - NEXT_PUBLIC_CONTENT_SITE_URL=${WAY_SITE_URL:-https://way.one2agi.com}
      - LANDING_REVALIDATION_URL=http://app:3000/api/revalidate
      - NODE_OPTIONS=--max-old-space-size=1536
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # content 的 Next.js 运行缓存；与 landing 的构建/渲染缓存隔离
      - notion-cache-way:/app/.next/cache
    deploy:
      resources:
        limits:
          memory: 1800M
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - nn-net

  redis:
    # 国内网络访问 docker.io 慢/被墙,用 DaoCloud mirror
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: notionnext-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - '60 1'
      - --loglevel
      - warning
      - --maxmemory
      - '256mb'
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    # 内存限制 256MB — 知识图谱 + 缓存共享层
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - nn-net

volumes:
  notion-cache:
    driver: local
  notion-cache-way:
    driver: local
  redis-data:
    driver: local

networks:
  nn-net:
    driver: bridge
