# 自建部署 - 1 节点,4G 内存假设
# 架构:Nginx (反代) -> app (单实例, 2G) -> redis (256M) -> Notion API
# 不上 PM2 / 多实例 (避免 ISR 缓存不一致)
#
# 启动: docker compose up -d --build
# 停:   docker compose down
# 删:   docker compose down -v  (连缓存一起清,慎用)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # build-arg 必传 — blog.config.js 顶层读取 NOTION_PAGE_ID
        NOTION_PAGE_ID: ${NOTION_PAGE_ID:?NOTION_PAGE_ID required, set in .env.production}
        NEXT_PUBLIC_THEME: ${NEXT_PUBLIC_THEME:-starter}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: notionnext:${IMAGE_TAG:-1.0.0}
    container_name: notionnext-app
    restart: unless-stopped
    ports:
      # 用 3030 避免和服务器现有 wechat-article-exporter 冲突(它占用 3000)
      - "127.0.0.1:3030:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      # REDIS_URL 指向 docker-compose 服务名 (自动 DNS 解析)
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # 持久化 Notion 缓存(容器重启不丢)
      - notion-cache:/app/.next/cache
    # 内存限制 2GB — 与 NODE_OPTIONS=--max-old-space-size=2048 对齐
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - nn-net

  redis:
    # 国内网络访问 docker.io 慢/被墙,用 DaoCloud mirror
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: notionnext-redis
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - '60 1'
      - --loglevel
      - warning
      - --maxmemory
      - '256mb'
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    # 内存限制 256MB — 知识图谱 + 缓存共享层
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - nn-net

volumes:
  notion-cache:
    driver: local
  redis-data:
    driver: local

networks:
  nn-net:
    driver: bridge
